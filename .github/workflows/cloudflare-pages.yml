name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for Pages (exclude large bundled world registry file)
        env:
          VITE_COUNTRY_REGISTRY_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/public/data/country-registry.json
        run: |
          mv public/data/country-registry.json /tmp/country-registry.json
          npm run build
          mv /tmp/country-registry.json public/data/country-registry.json
          test ! -f dist/data/country-registry.json

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy dist --project-name geofusion --branch master
